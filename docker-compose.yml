services:

  # ─── Your existing Docling service ───────────────────────────────────────────
  docling:
    image: quay.io/docling-project/docling-serve:latest
    # (no ports exposed externally – only reachable from this compose network)
    environment:
      - DOCLING_SERVE_ENABLE_UI=false
    restart: unless-stopped

  # ─── Docling Image Loader (this service) ─────────────────────────────────────
  docling-image-loader:
    build: .
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      # Override the Docling URL to use the compose service name
      - DOCLING_URL=http://docling:5001
    volumes:
      # Persists images written by the "local" / "both" storage backend.
      # The container path must match LOCAL_STORAGE_PATH in your .env.
      # Safe to leave mounted even if STORAGE_BACKEND=azure (it stays empty).
      - ./images:/data/images
    depends_on:
      - docling
    restart: unless-stopped
